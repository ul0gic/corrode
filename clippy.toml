# Lint LEVELS live in Cargo.toml [lints]; this file holds thresholds + the
# disallowed lists.

too-many-lines-threshold = 100
too-many-arguments-threshold = 6
cognitive-complexity-threshold = 25
type-complexity-threshold = 250
enum-variant-size-threshold = 200

# unwrap/expect are denied in production (Cargo.toml) but idiomatic in tests.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# A passive recon tool must never spawn processes or mutate the environment.
disallowed-methods = [
    { path = "std::process::Command::new", reason = "passive-only: never spawn external processes" },
    { path = "std::env::set_var", reason = "never mutate the process environment" },
    { path = "std::env::remove_var", reason = "never mutate the process environment" },
]

disallowed-types = []
